<!DOCTYPE html>
<html>
<head>
    <title>Checkout Page</title>
    <link rel="stylesheet" href="markup.css">
</head>
<body>
    <div class="payment">
        <div class="bg"></div>
        <div class="card">
            <img src="chip.png" class="chip">
            <div class="logo"></div>
            <h2 class="bankName" contenteditable="true">Enter Bank Name</h2>
            <form>
                <div class="inputBox">
                    <span>Card No.</span>
                    <input type="text" placeholder="0123 4567 8901 2345" maxlength="19">
                </div>
                <div class="inputBox">
                    <span>Card Holder</span>
                    <input type="text" placeholder="John Doe">
                </div>
                <div class="group">
                    <div class="inputBox">
                        <span>Expiry Date</span>
                        <input type="text" placeholder="MM/YY" maxlength="5">
                    </div>
                    <div class="inputBox">
                        <span>CVV</span>
                        <input type="password" placeholder="***" maxlength="4">
                    </div>
                </div>
            </form>
        </div>
        <button class="btn">Confirm and Pay</button>
    </div>
</body>
</html>
